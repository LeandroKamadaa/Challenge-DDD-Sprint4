<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pacientes - Hospital CRM</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <a href="/" class="btn btn-secondary mb-3">Voltar</a>
    <h1>Pacientes</h1>
    <table class="table table-bordered table-striped mt-3">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>CPF</th>
            <th>Data Nascimento</th>
            <th>Ações API</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="paciente : ${pacientes}">
            <td th:text="${paciente.id}"></td>
            <td th:text="${paciente.nome}"></td>
            <td th:text="${paciente.cpf}"></td>
            <td th:text="${paciente.dataNascimento}"></td>
            <td>
                <a th:href="@{/api/pacientes/{id}(id=${paciente.id})}" target="_blank" class="btn btn-sm btn-info">Ver JSON</a>
                <a th:href="@{/api/pacientes/{id}/imc(id=${paciente.id})}" target="_blank" class="btn btn-sm btn-primary">Ver IMC</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(pacientes)}">
            <td colspan="5" class="text-center">Nenhum paciente cadastrado.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
