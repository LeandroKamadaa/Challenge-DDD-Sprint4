<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Leads - Hospital CRM</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <a href="/" class="btn btn-secondary mb-3">Voltar</a>
    <h1>Leads</h1>
    <table class="table table-bordered table-striped mt-3">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Email</th>
            <th>Telefone</th>
            <th>Canal</th>
            <th>Ações API</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="lead : ${leads}">
            <td th:text="${lead.id}"></td>
            <td th:text="${lead.nome}"></td>
            <td th:text="${lead.email}"></td>
            <td th:text="${lead.telefone}"></td>
            <td th:text="${lead.canalEntrada}"></td>
            <td>
                <a th:href="@{/api/leads/{id}(id=${lead.id})}" target="_blank" class="btn btn-sm btn-info">Ver JSON</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(leads)}">
            <td colspan="6" class="text-center">Nenhum lead cadastrado.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
